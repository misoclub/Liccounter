<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="./css/main.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <title>お店情報の編集 - NightRatePro</title>
    <style>
        .custom-price-row .form-control { font-size: 0.85rem; padding: 0.25rem 0.5rem; }
        .custom-price-row label { margin-bottom: 0; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <span class="navbar-brand">お店情報の編集</span>
        <a href="./" class="btn btn-outline-light btn-sm">戻る</a>
    </nav>

    <div class="container py-4">
        <form id="edit-form">
            <h5 class="text-secondary border-bottom pb-2">基本設定</h5>
            <div class="form-group">
                <label>店舗名</label>
                <input type="text" class="form-control" id="shopName">
            </div>
            
            <div class="row">
                <div class="col-6 form-group">
                    <label>セット時間 (分)</label>
                    <input type="number" class="form-control" id="chargeTime">
                </div>
                <div class="col-6 form-group">
                    <label>セット料金 (円)</label>
                    <input type="number" class="form-control" id="chargeMoney">
                </div>
            </div>

            <div class="row">
                <div class="col-6 form-group">
                    <label>初回セット時間 (分)</label>
                    <input type="number" class="form-control" id="firstChargeTime">
                </div>
                <div class="col-6 form-group">
                    <label>初回セット料金 (円)</label>
                    <input type="number" class="form-control" id="firstChargeMoney">
                </div>
            </div>

            <div class="row">
                <div class="col-6 form-group">
                    <label>TAX (%)</label>
                    <input type="number" class="form-control" id="taxRate">
                </div>
                <div class="col-6 form-group">
                    <label>初期費用 (円)</label>
                    <input type="number" class="form-control" id="initialCost">
                </div>
            </div>

            <h5 class="text-secondary border-bottom pb-2 mt-4">ドリンク・指名単価</h5>
            <div class="row">
                <div class="col-6 form-group">
                    <label>ゲスドリ</label>
                    <input type="number" class="form-control" id="price_my">
                </div>
                <div class="col-6 form-group">
                    <label>キャスドリ</label>
                    <input type="number" class="form-control" id="price_cast">
                </div>
            </div>
            <div class="row">
                <div class="col-6 form-group">
                    <label>ショット</label>
                    <input type="number" class="form-control" id="price_shot">
                </div>
                <div class="col-6 form-group">
                    <label>他ドリンク</label>
                    <input type="number" class="form-control" id="price_other">
                </div>
            </div>
            <div class="form-group">
                <label>永続場内指名</label>
                <input type="number" class="form-control" id="price_endless">
            </div>

            <h5 class="text-secondary border-bottom pb-2 mt-4">カスタム項目設定</h5>
            <div class="row mb-2 font-weight-bold small text-secondary px-3">
                <div class="col-1 p-0 text-center">表</div>
                <div class="col-4 p-0">項目名</div>
                <div class="col-4 p-0">価格(円)</div>
                <div class="col-2 p-0 text-center">単位</div>
                <div class="col-1 p-0"></div>
            </div>
            <div id="custom-prices-area">
                <!-- 動的に項目が並びます -->
            </div>

            <div class="card mt-3 bg-white border-primary">
                <div class="card-body p-3">
                    <h6 class="card-title small text-primary font-weight-bold">新しい項目を追加</h6>
                    <div class="row no-gutters">
                        <div class="col-6 pr-1">
                            <input type="text" id="new-item-name" class="form-control form-control-sm" placeholder="項目名">
                        </div>
                        <div class="col-3 pr-1">
                            <input type="number" id="new-item-price" class="form-control form-control-sm" placeholder="価格">
                        </div>
                        <div class="col-2 pr-1">
                            <input type="text" id="new-item-suffix" class="form-control form-control-sm" placeholder="単位">
                        </div>
                        <div class="col-1">
                            <button type="button" id="add-new-item-btn" class="btn btn-primary btn-sm btn-block"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-5 pb-5">
                <button type="submit" class="btn btn-primary btn-lg btn-block">設定を保存して戻る</button>
                <button type="button" id="delete-btn" class="btn btn-outline-danger btn-block mt-3">このお店情報を削除する</button>
            </div>
        </form>
    </div>

    <!-- 通知用トーストコンテナ -->
    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 1060;"></div>

    <!-- カスタム確認モーダル -->
    <div class="modal fade" id="confirmModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title font-weight-bold text-secondary" id="confirmTitle">確認</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close" id="confirmCloseBtn">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body py-4" id="confirmMessage">
                    メッセージ内容
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light shadow-0" data-dismiss="modal" id="confirmCancelBtn">キャンセル</button>
                    <button type="button" class="btn btn-primary shadow-0" id="confirmOkBtn">はい</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
    <script src="./js/store.legacy.min.js"></script>
    <script type="module" src="./js/edit.js"></script>
</body>
</html>
