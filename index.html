<!doctype html>
<html lang="ja">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no">
    <meta name="google-site-verification" content="BBk7nRBTF-C40Nqt_VzeXvUfLiHnlNqtOUB7bpR0e5k" />
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="./js/bootstrap-datepicker/css/bootstrap-datepicker3.min.css">
    <link rel="stylesheet" type="text/css" href="./js/bootstrap-datepicker/css/bootstrap-datepicker3.standalone.min.css">
    <link rel="stylesheet" type="text/css" href="./css/sticky-footer.css">
    <link rel="stylesheet" type="text/css" href="./css/main.css">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <!-- MDB -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.1.0/mdb.min.css" rel="stylesheet" />
    <title>NightRatePro</title>
    <link rel="shortcut icon" href="./favicon.ico" />
    <link rel="apple-touch-icon" href="./images/iconwhite.png" sizes="72x72">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="./"><img src="images/title3.png" width="130" class="d-inline-block align-center ml-2"> </a>
        <div class="dropdown mr-2">
            <button class="btn btn-dark px-3" type="button" id="dropdownMenuButton" data-mdb-toggle="dropdown" aria-expanded="false">
                <i class="fas fa-bars fa-lg"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dropdownMenuButton">
                <li><a class="dropdown-item" id="export-json" href="javascript:void(0)">JSONエクスポート</a></li>
                <li><a class="dropdown-item" id="import-json" href="javascript:void(0)">JSONインポート</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" id="cacheclear" href="javascript:void(0)">キャッシュクリア</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <form id="mail-form" class="py-4">
            <div class="row">
                <div class="col ui_runtime" style="display: none;">
                    <h3 class="text-secondary">お会計合計</h3>
                    <p class="example1" id="moneyText">0円</p>
                    <p class="example2" id="taxText">内税0円</p>
                </div>
            </div>
            <div class="row ui_runtime" style="display: none;">
                <div class="col">
                    <!-- <h6 class="text-secondary">店舗名</h6> -->
                    <h6 class="text-secondary" id="shopNameText"> - </h6>
                    <!-- <h6 class="text-secondary">来店人数</h6> -->
                    <h6 class="text-secondary" id="numPeopleText"> - </h6>
                    <!-- <h6 class="text-secondary">初回セット料金</h6> -->
                    <h6 class="text-secondary" id="firstChargeText"> - </h6>
                    <!-- <h6 class="text-secondary">セット間隔</h6> -->
                    <h6 class="text-secondary" id="chargeText"> - </h6>
                    <!-- <h6 class="text-secondary">TAX</h6> -->
                    <h6 class="text-secondary" id="taxSettingText"> - </h6>
                    <!-- <h6 class="text-secondary">初期費用</h6> -->
                    <h6 class="text-secondary" id="initMoneyText"> - </h6>
                    <h6 class="text-secondary d-flex align-items-center">
                        <label for="startTimeEdit" class="mb-0 d-flex align-items-center" style="cursor: pointer; color: inherit; font-weight: inherit;">
                            入店時刻：<span id="startTimeDisplay">--:--</span>
                            <i class="fas fa-edit text-info ml-2" style="font-size: 0.9rem;"></i>
                        </label>
                        <input type="time" id="startTimeEdit" style="position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none;">
                    </h6>
                    <!-- <h6 class="text-secondary">経過時間</h6> -->
                    <h6 class="text-secondary" id="timeText">滞在時間：00:00</h6>                    <!-- <h6 class="text-secondary">セット残り時間</h6> -->
                    <h6 class="text-secondary" id="lastChaegeText">00:00:00</h6>
                </div>
            </div>
            <div class="row">
                <div class="col ui_setting">
                    <h6 class="text-secondary">店舗名</h6>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="shopNameSetting" value="" placeholder="名無しのお店" aria-label="">
                    </div>
                    <h6 class="text-secondary">人数*</h6>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="numSetting" value="1" placeholder="1" aria-label="" inputmode="numeric">
                        <span class="input-group-text">人</span>
                    </div>
                    <h6 class="text-secondary">初回セット時間</h6>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="firstTimeChargeTimeSetting" value="0" placeholder="0" inputmode="numeric" aria-label="">
                        <span class="input-group-text">分</span>
                    </div>
                    <h6 class="text-secondary">初回セット料金</h6>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="firstTimeChargeMoneySetting" value="0" placeholder="0" inputmode="numeric" aria-label="">
                        <span class="input-group-text">円</span>
                    </div>
                    <h6 class="text-secondary">セット間隔*</h6>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="chargeTimeSetting" value="50" placeholder="50" inputmode="numeric" aria-label="">
                        <span class="input-group-text">分</span>
                    </div>
                    <h6 class="text-secondary">セット料金*</h6>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="chageSetting" value="3000" placeholder="3000" inputmode="numeric" aria-label="">
                        <span class="input-group-text">円</span>
                    </div>
                    <h6 class="text-secondary">TAX*</h6>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="taxSetting" value="10" placeholder="10" inputmode="numeric" aria-label="">
                        <span class="input-group-text">%</span>
                    </div>
                    <h6 class="text-secondary">その他初期費用</h6>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="otherSetting" value="0" placeholder="0" inputmode="numeric" aria-label="">
                        <span class="input-group-text">円</span>
                    </div>
                </div>
            </div>
            <div class="row ui_runtime" style="display: none;">
                <div class="col">
                    <button type="button" class="btn btn-outline-success btn-lg btn-block" id="pro-drink">ゲストドリンク</button>
                    <div class="input-group input-group-sm mb-3">
                        <input type="text" class="form-control" id="pro-amount" aria-label="Sizing example input" value="1000" placeholder="1000" inputmode="numeric" aria-describedby="inputGroup-sizing-sm">
                    </div>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-warning btn-lg btn-block" id="hino-drink">キャストドリンク</button>
                    <div class="input-group input-group-sm mb-3">
                        <input type="text" class="form-control" id="hino-amount" aria-label="Sizing example input" value="1000" placeholder="1000" inputmode="numeric" aria-describedby="inputGroup-sizing-sm">
                    </div>
                </div>
            </div>
            <div class="row ui_runtime" style="display: none;">
                <div class="col">
                    <button type="button" class="btn btn-outline-success btn-lg btn-block" id="sp-drink">ゲストショット</button>
                    <div class="input-group input-group-sm mb-3">
                        <input type="text" class="form-control" id="sp-amount" aria-label="Sizing example input" value="1000" placeholder="1000" inputmode="numeric" aria-describedby="inputGroup-sizing-sm">
                    </div>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-warning btn-lg btn-block" id="other-drink">キャストショット</button>
                    <div class="input-group input-group-sm mb-3">
                        <input type="text" class="form-control" id="other-amount" aria-label="Sizing example input" value="1500" placeholder="1500" inputmode="numeric" aria-describedby="inputGroup-sizing-sm">
                    </div>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-danger btn-lg btn-block" id="endless-jyonai-shimei">永続場内指名</button>
                    <div class="input-group input-group-sm mb-3">
                        <input type="text" class="form-control" id="endless-jyonai-shimei-amount" aria-label="Sizing example input" value="2000" placeholder="2000" inputmode="numeric" aria-describedby="inputGroup-sizing-sm">
                    </div>
                </div>
                <div class="col">
                    <select class="form-control form-control-lg mb-1 custom-select-blue" id="customItemSelect" style="height: 48px; font-size: 1rem;">
                        <option value="同伴料🤝：">同伴料</option>
                        <option value="チェキ📸：">チェキ</option>
                        <option value="単発場内指名☝️：">場内指名</option>
                        <option value="シャンパン🍾：">シャンパン</option>
                        <option value="日本酒🍶：">日本酒</option>
                        <option value="テキーラ🌵：">テキーラ</option>
                        <option value="コカボム💣：">コカボム</option>
                        <option value="クライナー🍾：">クライナー</option>
                        <option value="イエーガー🦌：">イエーガー</option>
                        <option value="料理🍳：">料理</option>
                        <option value="その他：">その他</option>
                    </select>
                    <div class="input-group input-group-sm mb-3">
                        <input type="text" class="form-control" id="customItemAmount" value="2000" inputmode="numeric">
                        <div class="input-group-append">
                            <button class="btn btn-primary" type="button" id="addCustomItem">追加</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <button type="button" class="btn btn-primary btn-lg btn-block" id="start">入店</button>
                </div>
            </div>
            <hr>
            <div class="ui_runtime" style="display: none;">
                <div class="row">
                    <div class="col">
                        <h3 class="text-secondary">お会計詳細</h3>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <table class="table table-striped" id="processesTable">
                            <thead class="thead-dark">
                                <tr>
                                    <th scope="col" style="width: 20%;">時刻</th>
                                    <th scope="col" style="width: 40%;">品名</th>
                                    <th scope="col" style="width: 40%;" class="text-right">金額</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>


            <!-- お会計ボタン -->
            <div class="ui_runtime" style="display: none;">
                <div class="row">
                    <div class="my-box mt-5"></div>
                </div>
                <hr>
                <div class="row">
                    <div class="col" id="checkout-actions">
                        <button type="button" class="btn btn-danger btn-lg btn-block" id="stop">お会計</button>
                        <button type="button" class="btn btn-info btn-lg btn-block mt-3" id="resultDownload" style="display: none;">結果を保存</button>
                        <button type="button" class="btn btn-secondary btn-lg btn-block mt-3" id="backToTop" style="display: none;">トップへ戻る</button>
                    </div>
                </div>
                <div class="row">
                    <div class="my-box mt-5"></div>
                </div>
            </div>


            <!-- 未来予測ボタンとテーブル -->
            <div class="ui_runtime" style="display: none;">
                <hr>
                <div class="row">
                    <div class="col">
                        <button type="button" class="btn btn-secondary btn-lg btn-block" id="futureButton">お会計予報を表示</button>
                    </div>
                </div>
                <div class="row">
                    <div class="my-box mt-3"></div>
                </div>
                <div id="futureTable" style="display: none;">
                    <div class="row">
                        <div class="col">
                            <h3 class="text-secondary">お会計予報</h3>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <table class="table table-striped" id="futurePprocessesTable">
                                <thead class="thead-dark">
                                    <tr>
                                        <th scope="col-md-auto">時刻</th>
                                        <th scope="col">セット数</th>
                                        <th scope="col">金額</th>
                                    </tr>
                                </thead>
                                <tbody>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="row">
                        <div class="my-box mt-5"></div>
                    </div>

                </div>

            </div>

            <!-- お店情報保存ボタン -->
            <div class="ui_runtime" style="display: none;">
                <hr>
                <div class="row ui_runtime" style="display: none;">
                    <div class="col">
                        <button type="button" class="btn btn-secondary btn-lg btn-block" id="save-preset">お店情報を保存</button>
                    </div>
                </div>
            </div>


            <div class="row ui_setting">
                <h6 class="text-secondary">保存したお店</h6>
                <div id="presetButtonTarget" class="w-100">
                </div>
            </div>

            <div class="row">
                <div class="my-box mt-5"></div>
            </div>
        </form>
    </div>
    <footer class="footer noselect">
        <p class="text-light text-center" style="padding-top: 8px; margin: 0px" id="nt">naito-pro</p>
    </footer>
    <!-- Google APIs Client Libraryの読み込み。読み込み後にonloadに指定した関数が呼ばれる。 -->
    <script src="https://apis.google.com/js/client.js?onload=onLoad"></script>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="./js/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
    <script src="./js/bootstrap-datepicker/js/bootstrap-datepicker.min.js"></script>
    <script src="./js/bootstrap-datepicker/locales/bootstrap-datepicker.ja.min.js"></script>
    <script src="./js/store.legacy.min.js"></script>
    <!-- MDB -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.1.0/mdb.min.js"></script>
    <!-- JSONインポート用の隠しinput -->
    <input type="file" id="import-file" style="display: none;" accept=".json">
    
    <!-- 通知用トーストコンテナ -->
    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 1060;"></div>

    <!-- カスタム確認モーダル -->
    <div class="modal fade" id="confirmModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title font-weight-bold text-secondary" id="confirmTitle">確認</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body py-4" id="confirmMessage">
                    メッセージ内容
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light shadow-0" data-dismiss="modal" id="confirmCancelBtn">キャンセル</button>
                    <button type="button" class="btn btn-primary shadow-0" id="confirmOkBtn">はい</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 自分のJS -->
    <script type="module" src="./js/app.js"></script>
</body>

</html>
